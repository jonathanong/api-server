src:
  - changed-files:
      - any-glob-to-any-file: 'src/**'

docs:
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**'
          - 'README.md'

ci:
  - changed-files:
      - any-glob-to-any-file: '.github/**'

config:
  - changed-files:
      - any-glob-to-any-file:
          - 'package.json'
          - 'tsconfig.json'
          - 'vitest.config.*'
          - '.oxlintrc.json'
