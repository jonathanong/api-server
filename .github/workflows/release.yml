name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump type
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
          - premajor
          - preminor
          - prepatch
          - prerelease

permissions:
  contents: read
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check RELEASE_TOKEN is set
        run: |
          if [ -z "${{ secrets.RELEASE_TOKEN }}" ]; then
            echo "::error::RELEASE_TOKEN secret is not set. This workflow requires a PAT whose owner is in the main branch ruleset bypass list." >&2
            exit 1
          fi

      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.1.2

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify trusted publishing toolchain
        run: |
          node --version
          npm --version
          node -e "const [major, minor, patch] = process.versions.node.split('.').map(Number); if (major < 22 || (major === 22 && (minor < 14 || (minor === 14 && patch < 0)))) throw new Error('npm OIDC trusted publishing requires Node 22.14.0+');"
          node -e "const version = require('node:child_process').execFileSync('npm', ['--version'], { encoding: 'utf8' }).trim(); const [major, minor, patch] = version.split('.').map(Number); if (major < 11 || (major === 11 && (minor < 5 || (minor === 5 && patch < 1)))) throw new Error('npm OIDC trusted publishing requires npm 11.5.1+');"

      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump versions, commit, tag
        id: bump
        run: |
          pnpm version "${{ inputs.bump }}" --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json pnpm-lock.yaml
          git commit -m "chore(release): v$VERSION" -m "Co-authored-by: Codex <noreply@openai.com>"
          git tag -a "v$VERSION" -m "v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - run: git push origin HEAD:main --follow-tags

      - run: npm publish --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            --title "v${{ steps.bump.outputs.version }}" \
            --generate-notes
